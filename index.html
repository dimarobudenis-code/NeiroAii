<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>NeiroAi</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-0: #030308;
      --bg-1: #08081a;
      --bg-2: #0e0e22;
      --bg-3: #14142e;
      --bg-4: #1c1c3a;
      --accent: #7c5dfa;
      --accent-l: #9b85ff;
      --accent-g: rgba(124, 93, 250, .3);
      --cyan: #00e5c6;
      --cyan-g: rgba(0, 229, 198, .2);
      --pink: #ff4d8a;
      --txt: #e4e4ed;
      --txt2: #6a6a85;
      --txt3: #3a3a55;
      --brd: rgba(255,255,255,.06);
      --brd2: rgba(255,255,255,.1);
      --err: #ff4060;
      --ok: #00e5c6;
      --warn: #ffb347;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg-0);
      font-family: 'Inter', sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .hidden { display: none !important; }

    /* BACKGROUND */
    .bg-grid {
      position: fixed;
      inset: 0;
      z-index: -3;
      background-image:
        linear-gradient(rgba(124,93,250,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,93,250,.025) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: gridScroll 60s linear infinite;
    }

    @keyframes gridScroll {
      to { background-position: 50px 50px; }
    }

    .bg-glow {
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      animation: orbDrift 25s ease-in-out infinite;
    }

    .o1 {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, var(--accent-g), transparent 70%);
      top: -15%;
      left: -10%;
    }

    .o2 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, var(--cyan-g), transparent 70%);
      bottom: -20%;
      right: -10%;
      animation-delay: -8s;
    }

    .o3 {
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(255,77,138,.18), transparent 70%);
      top: 40%;
      left: 40%;
      animation-delay: -16s;
    }

    @keyframes orbDrift {
      0%,100% { transform: translate(0,0) scale(1); }
      25% { transform: translate(40px,-40px) scale(1.08); }
      50% { transform: translate(-30px,30px) scale(.92); }
      75% { transform: translate(30px,40px) scale(1.04); }
    }

    .particles {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      overflow: hidden;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: #fff;
      border-radius: 50%;
      animation: twinkle var(--d, 4s) ease-in-out infinite;
      opacity: 0;
    }

    @keyframes twinkle {
      0%,100% { opacity: 0; transform: scale(.5); }
      50% { opacity: var(--o,.6); transform: scale(1); }
    }

    .meteor {
      position: absolute;
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, var(--accent), transparent);
      animation: shoot var(--d, 6s) linear infinite;
      opacity: 0;
      top: var(--t, 10%);
      left: -100px;
      transform: rotate(-15deg);
    }

    @keyframes shoot {
      0% { left: -100px; opacity: 0; }
      5% { opacity: .8; }
      30% { left: 110vw; opacity: 0; }
      100% { left: 110vw; opacity: 0; }
    }

    /* LOGIN */
    .login-screen {
      position: fixed;
      inset: 0;
      z-index: 2000;
      background: var(--bg-0);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 22px;
      text-align: center;
      padding: 24px;
    }

    .login-logo {
      width: 120px;
      height: 120px;
      background: linear-gradient(135deg, var(--accent), var(--cyan));
      border-radius: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 20px 60px -15px var(--accent-g);
      animation: floatLogo 5s ease-in-out infinite;
    }

    @keyframes floatLogo {
      0%,100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-8px) rotate(2deg); }
    }

    .login-logo svg {
      width: 58px;
      height: 58px;
      stroke: #fff;
      fill: none;
      stroke-width: 1.5;
    }

    .login-screen h1 {
      font-size: 2.1em;
      color: var(--txt);
      font-weight: 800;
    }

    .login-screen p {
      color: var(--txt2);
      max-width: 320px;
      line-height: 1.6;
      font-size: .95em;
    }

    .login-btn,
    .skip-btn {
      width: 100%;
      max-width: 320px;
      padding: 15px 20px;
      border-radius: 16px;
      font-family: inherit;
      font-size: .95em;
      font-weight: 600;
      cursor: pointer;
      transition: .25s;
    }

    .login-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: var(--bg-3);
      border: 1px solid var(--brd2);
      color: var(--txt);
    }

    .login-btn:hover {
      background: var(--bg-4);
      border-color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 10px 30px -8px var(--accent-g);
    }

    .skip-btn {
      background: transparent;
      border: 1px dashed var(--brd2);
      color: var(--txt2);
    }

    .skip-btn:hover {
      border-color: var(--accent);
      color: var(--txt);
    }

    /* APP */
    .app {
      width: 100%;
      height: 100vh;
      height: 100dvh;
      background: linear-gradient(170deg, var(--bg-1), var(--bg-0));
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* HEADER */
    .hdr {
      padding: 12px 14px;
      background: linear-gradient(180deg, var(--bg-2), transparent);
      border-bottom: 1px solid var(--brd);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .logo {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--accent), var(--cyan));
      border-radius: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
      box-shadow: 0 8px 24px -6px var(--accent-g);
    }

    .logo::before {
      content: '';
      position: absolute;
      inset: -50%;
      background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,.15) 50%, transparent 60%);
      animation: shine 5s ease-in-out infinite;
    }

    @keyframes shine {
      0%,100% { transform: translateX(-100%) rotate(45deg); }
      50% { transform: translateX(100%) rotate(45deg); }
    }

    .logo svg {
      width: 24px;
      height: 24px;
      stroke: #fff;
      fill: none;
      stroke-width: 1.5;
      z-index: 1;
      position: relative;
    }

    .hdr-info {
      min-width: 0;
      flex: 1;
    }

    .hdr-info h1 {
      font-size: 1.08em;
      font-weight: 800;
      color: var(--txt);
      letter-spacing: -.03em;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .badge {
      padding: 3px 8px;
      background: var(--bg-4);
      border: 1px solid var(--brd2);
      border-radius: 6px;
      font-size: .55em;
      font-weight: 500;
      color: var(--accent-l);
    }

    .hdr-info .st {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 2px;
      font-size: .75em;
      color: var(--txt2);
    }

    .st-dot {
      width: 6px;
      height: 6px;
      background: var(--ok);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--ok);
      animation: blink 2.5s ease-in-out infinite;
    }

    @keyframes blink {
      0%,100% { opacity: 1; }
      50% { opacity: .3; }
    }

    .user-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      object-fit: cover;
    }

    .hdr-acts {
      margin-left: auto;
      display: flex;
      gap: 6px;
      align-items: center;
      flex-shrink: 0;
    }

    .hdr-btn {
      width: 36px;
      height: 36px;
      border: 1px solid var(--brd);
      background: var(--bg-3);
      border-radius: 10px;
      color: var(--txt2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: .2s;
    }

    .hdr-btn svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5;
    }

    .hdr-btn:hover {
      background: var(--bg-4);
      border-color: var(--accent);
      color: var(--txt);
    }

    /* SIDEBAR */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 82%;
      max-width: 320px;
      height: 100%;
      background: var(--bg-1);
      border-right: 1px solid var(--brd);
      z-index: 999;
      transform: translateX(-100%);
      transition: .35s cubic-bezier(.16,1,.3,1);
      display: flex;
      flex-direction: column;
    }

    .sidebar.open { transform: translateX(0); }

    .sidebar-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 998;
      opacity: 0;
      visibility: hidden;
      transition: .3s;
    }

    .sidebar-overlay.open {
      opacity: 1;
      visibility: visible;
    }

    .sb-header {
      padding: 18px;
      border-bottom: 1px solid var(--brd);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sb-header h3 {
      color: var(--txt);
      font-size: 1.05em;
    }

    .sb-close {
      width: 34px;
      height: 34px;
      border: none;
      background: var(--bg-3);
      border-radius: 10px;
      color: var(--txt2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .sb-close svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }

    .sb-new {
      margin: 12px 16px;
      padding: 12px;
      border: 1px dashed var(--brd2);
      border-radius: 12px;
      background: transparent;
      color: var(--accent-l);
      cursor: pointer;
      font-family: inherit;
      font-size: .88em;
      transition: .2s;
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: center;
    }

    .sb-new:hover {
      background: var(--bg-3);
      border-color: var(--accent);
    }

    .sb-new svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }

    .sb-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .sb-item {
      padding: 12px 14px;
      border-radius: 10px;
      cursor: pointer;
      transition: .15s;
      color: var(--txt2);
      font-size: .88em;
      display: flex;
      align-items: center;
      gap: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      border: 1px solid transparent;
    }

    .sb-item:hover {
      background: var(--bg-3);
      color: var(--txt);
    }

    .sb-item.active {
      background: var(--bg-4);
      color: var(--txt);
      border-color: var(--brd2);
    }

    .sb-item svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5;
      flex-shrink: 0;
    }

    .sb-item-del {
      margin-left: auto;
      opacity: 0;
      transition: .15s;
      flex-shrink: 0;
    }

    .sb-item:hover .sb-item-del { opacity: 1; }

    .sb-item-del svg {
      width: 14px;
      height: 14px;
      stroke: var(--err);
    }

    /* LOGIN PROMPT */
    .guest-banner {
      display: none;
      margin: 10px 14px 0;
      padding: 10px 12px;
      background: rgba(255,179,71,.08);
      border: 1px solid rgba(255,179,71,.22);
      border-radius: 12px;
      color: #ffd9a6;
      font-size: .78em;
      line-height: 1.45;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      animation: fadeIn .35s ease;
    }

    .guest-banner.show { display: flex; }

    .guest-banner button {
      border: none;
      background: var(--warn);
      color: #1a1205;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: .78em;
      font-weight: 700;
      cursor: pointer;
      flex-shrink: 0;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ATTACH PREVIEW */
    .attach-preview {
      display: none;
      padding: 8px 14px;
      background: var(--bg-3);
      border-bottom: 1px solid var(--brd);
      align-items: center;
      gap: 10px;
      animation: fadeIn .3s ease;
      flex-shrink: 0;
    }

    .attach-preview.visible {
      display: flex;
    }

    .attach-thumb {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      object-fit: cover;
      border: 1px solid var(--brd2);
      flex-shrink: 0;
    }

    .attach-name {
      flex: 1;
      font-size: .82em;
      color: var(--txt2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .attach-remove {
      width: 30px;
      height: 30px;
      border: none;
      background: var(--bg-4);
      border-radius: 8px;
      color: var(--err);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .attach-remove svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }

    /* MESSAGES */
    .msgs {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .msgs::-webkit-scrollbar {
      width: 4px;
    }

    .msgs::-webkit-scrollbar-thumb {
      background: var(--brd2);
      border-radius: 2px;
    }

    .msg {
      max-width: 85%;
      padding: 12px 14px;
      border-radius: 18px;
      line-height: 1.6;
      font-size: .9em;
      word-break: break-word;
      animation: msgPop .35s cubic-bezier(.16,1,.3,1);
    }

    @keyframes msgPop {
      from { opacity: 0; transform: translateY(10px) scale(.97); }
      to { opacity: 1; transform: none; }
    }

    .msg.user {
      align-self: flex-end;
      background: linear-gradient(135deg, var(--accent), #5a45e6);
      color: #fff;
      border-bottom-right-radius: 6px;
      box-shadow: 0 4px 16px -4px var(--accent-g);
      white-space: pre-wrap;
    }

    .msg.bot {
      align-self: flex-start;
      background: var(--bg-3);
      color: var(--txt);
      border: 1px solid var(--brd);
      border-bottom-left-radius: 6px;
    }

    .msg.error {
      align-self: flex-start;
      background: linear-gradient(135deg, var(--err), #d03050);
      color: #fff;
      border-bottom-left-radius: 6px;
      white-space: pre-wrap;
    }

    .msg.sys {
      align-self: center;
      background: transparent;
      border: 1px dashed var(--brd2);
      color: var(--txt3);
      font-size: .8em;
      text-align: center;
      max-width: 90%;
      padding: 10px 12px;
      white-space: pre-wrap;
    }

    .msg-image {
      max-width: 100%;
      max-height: 280px;
      border-radius: 12px;
      margin-bottom: 8px;
      display: block;
    }

    /* CODE */
    .code-block {
      background: #0a0a16;
      border: 1px solid var(--brd2);
      border-radius: 12px;
      margin: 8px 0 4px;
      overflow: hidden;
    }

    .code-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 12px;
      background: rgba(255,255,255,.03);
      border-bottom: 1px solid var(--brd);
    }

    .code-lang {
      font-size: .72em;
      color: var(--accent-l);
      font-weight: 600;
      text-transform: uppercase;
    }

    .copy-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border: 1px solid var(--brd2);
      border-radius: 6px;
      background: transparent;
      color: var(--txt2);
      cursor: pointer;
      font-size: .72em;
      font-family: 'Inter', sans-serif;
      transition: .2s;
    }

    .copy-btn svg {
      width: 12px;
      height: 12px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5;
    }

    .copy-btn:hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .copy-btn.copied {
      background: var(--ok);
      color: #fff;
      border-color: var(--ok);
    }

    .code-body {
      padding: 12px 14px;
      overflow-x: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: .78em;
      line-height: 1.7;
      color: #c9d1d9;
      white-space: pre;
    }

    .code-body::-webkit-scrollbar {
      height: 3px;
    }

    .code-body::-webkit-scrollbar-thumb {
      background: var(--brd2);
      border-radius: 2px;
    }

    .inline-code {
      background: rgba(124,93,250,.15);
      color: var(--accent-l);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: .85em;
    }

    .bot-text {
      white-space: pre-wrap;
      line-height: 1.6;
    }

    /* THINKING */
    .think-block {
      margin: 6px 0;
      border: 1px solid rgba(124,93,250,.2);
      border-radius: 10px;
      overflow: hidden;
      background: rgba(124,93,250,.05);
    }

    .think-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: .8em;
      color: var(--accent-l);
      transition: .2s;
      user-select: none;
    }

    .think-header:hover {
      background: rgba(124,93,250,.1);
    }

    .think-header svg {
      width: 14px;
      height: 14px;
      stroke: var(--accent);
      fill: none;
      stroke-width: 2;
      transition: transform .3s;
    }

    .think-header.open svg {
      transform: rotate(90deg);
    }

    .think-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height .4s cubic-bezier(.16,1,.3,1);
      padding: 0 12px;
      font-size: .82em;
      color: var(--txt2);
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .think-body.open {
      max-height: 2000px;
      padding: 0 12px 12px;
    }

    /* IMAGE GEN */
    .gen-image-wrap {
      margin: 8px 0;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--brd2);
    }

    .gen-image {
      width: 100%;
      max-width: 512px;
      display: block;
      border-radius: 12px;
      background: var(--bg-3);
      min-height: 180px;
    }

    .gen-image-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 36px;
      color: var(--txt2);
      font-size: .88em;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--brd2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .img-actions {
      display: flex;
      gap: 6px;
      margin-top: 6px;
      flex-wrap: wrap;
    }

    .img-btn {
      padding: 6px 12px;
      border: 1px solid var(--brd2);
      border-radius: 8px;
      background: var(--bg-3);
      color: var(--txt2);
      cursor: pointer;
      font-size: .78em;
      font-family: inherit;
      transition: .2s;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .img-btn svg {
      width: 13px;
      height: 13px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5;
    }

    .img-btn:hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    /* TYPING */
    .typing {
      align-self: flex-start;
      background: var(--bg-3);
      border: 1px solid var(--brd);
      padding: 14px 22px;
      border-radius: 18px;
      border-bottom-left-radius: 6px;
      display: flex;
      gap: 5px;
      animation: msgPop .3s ease;
    }

    .typing span {

    function handleFileSelect(event) {
      const file = event.target.files[0];
      if (!file) return;

      selectedAttachment = file;

      const preview = document.getElementById('attachPreview');
      const thumb = document.getElementById('attachThumb');
      const name = document.getElementById('attachName');

      name.textContent = file.name;
      preview.classList.add('visible');

      if (file.type.startsWith('image/')) {
        const reader = new FileReader();
        reader.onload = e => {
          thumb.src = e.target.result;
          thumb.classList.remove('hidden');
        };
        reader.readAsDataURL(file);
      } else {
        thumb.classList.add('hidden');
        thumb.src = '';
      }
    }

    function clearAttachment() {
      selectedAttachment = null;
      document.getElementById('fileInput').value = '';
      document.getElementById('attachPreview').classList.remove('visible');
      document.getElementById('attachThumb').src = '';
      document.getElementById('attachThumb').classList.add('hidden');
      document.getElementById('attachName').textContent = '';
    }

    async function readFileAsText(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result);
        reader.onerror = reject;
        reader.readAsText(file);
      });
    }

    async function readFileAsBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

      list.innerHTML = '';

      try {
        const snap = await db.collection('users').doc(currentUser.uid)
          .collection('chats').orderBy('updatedAt', 'desc').limit(50).get();

        if (snap.empty) {
          list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--txt3);font-size:.85em">Пока нет чатов</div>';
          return;
        }

        snap.forEach(doc => {
          const data = doc.data();
          const item = document.createElement('div');
          item.className = 'sb-item' + (doc.id === currentChatId ? ' active' : '');
          item.innerHTML = `
            <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <span>${data.title || 'Чат'}</span>
            <div class="sb-item-del" onclick="event.stopPropagation();deleteChat('${doc.id}')">
              <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </div>
          `;
          item.addEventListener('click', () => loadChat(doc.id));
          list.appendChild(item);
        });
      } catch (e) {
        list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--txt3);font-size:.85em">Войди для сохранения</div>';
      }
    }

    async function saveChat() {
      if (!currentUser) return;
      const msgs = history.filter(m => m.role !== 'system');
      if (!msgs.length) return;

      const title = msgs.find(m => m.role === 'user')?.content?.slice(0, 40) || 'Чат';
      const ref = db.collection('users').doc(currentUser.uid).collection('chats');

      try {
        if (currentChatId) {
          await ref.doc(currentChatId).update({
            messages: msgs,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
            title
          });
        } else {
          const doc = await ref.add({
            messages: msgs,
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
            title,
            mode: curMode
          });
          currentChatId = doc.id;
        }
      } catch (e) {
        console.error(e);
      }
    }

    async function loadChat(chatId) {
      if (!currentUser) return;
      try {
        const doc = await db.collection('users').doc(currentUser.uid)
          .collection('chats').doc(chatId).get();
        if (!doc.exists) return;

        currentChatId = chatId;
        resetHistory();
        document.getElementById('messages').innerHTML = '';

        doc.data().messages.forEach(m => {
          history.push(m);
          addMsg(m.content, m.role === 'user' ? 'user' : 'bot');
        });

        closeSidebar();
        loadChatList();
      } catch (e) {
        console.error(e);
      }
    }

    async function deleteChat(chatId) {
      if (!currentUser) return;
      await db.collection('users').doc(currentUser.uid)
        .collection('chats').doc(chatId).delete();
      if (chatId === currentChatId) {
        currentChatId = null;
        clearChat();
      }
      loadChatList();
    }

    function newChat() {
      currentChatId = null;
      clearChat();
      closeSidebar();
    }

    // ==========================
    // SETTINGS
    // ==========================
    function openSettings() {
      document.getElementById('settingsModal').classList.add('open');
    }

    function closeSettings() {
      document.getElementById('settingsModal').classList.remove('open');
    }

    function saveSettings() {
      const name = document.getElementById('aiName').value.trim() || 'NeiroAi';
      const mode = document.querySelector('.mopt.act')?.dataset.mode || 'normal';

      localStorage.setItem('ai_name', name);
      localStorage.setItem('ai_mode', mode);

      aiName = name;
      curMode = mode;

      document.getElementById('headerTitle').textContent = name;
      updateModeUI();
      resetHistory();
      closeSettings();
      notify('Сохранено — ' + MODES[curMode].name);
    }

    function notify(text) {
      const msg = document.createElement('div');
      msg.className = 'msg sys';
      msg.textContent = text;
      document.getElementById('messages').appendChild(msg);
      setTimeout(() => msg.remove(), 2500);
    }

    // ==========================
    // PARSE
    // ==========================
    function parseMessage(text) {
      const container = document.createElement('div');

      const thinkRegex = /<thinking>([\s\S]*?)<\/thinking>/gi;
      const parts = [];
      let lastIdx = 0;
      let match;

      while ((match = thinkRegex.exec(text)) !== null) {
        if (match.index > lastIdx) {
          parts.push({ type: 'text', content: text.slice(lastIdx, match.index) });
        }
        parts.push({ type: 'thinking', content: match[1].trim() });
        lastIdx = match.index + match[0].length;
      }

      if (lastIdx < text.length) {
        parts.push({ type: 'text', content: text.slice(lastIdx) });
      }

      if (!parts.length) {
        parts.push({ type: 'text', content: text });
      }

      parts.forEach(part => {
        if (part.type === 'thinking') {
          const block = document.createElement('div');
          block.className = 'think-block';

          const header = document.createElement('div');
          header.className = 'think-header';
          header.innerHTML = '<svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>Ход мыслей';

          const body = document.createElement('div');
          body.className = 'think-body';
          body.textContent = part.content;

          header.addEventListener('click', () => {
            header.classList.toggle('open');
            body.classList.toggle('open');
          });

          setTimeout(() => {
            header.classList.add('open');
            body.classList.add('open');
          }, 300);

          block.appendChild(header);
          block.appendChild(body);
          container.appendChild(block);
        } else {
          parseTextWithCode(part.content, container);
        }
      });

      return container;
    }

    function parseTextWithCode(text, container) {
      text.split(/(```[\s\S]*?```)/g).forEach(part => {
        if (part.startsWith('```') && part.endsWith('```')) {
          const inner = part.slice(3, -3);
          const newlineIdx = inner.indexOf('\n');
          let lang = '';
          let code = inner;

          if (newlineIdx > -1 && newlineIdx < 30) {
            const maybeLang = inner.slice(0, newlineIdx).trim();
            if (maybeLang && !/\s/.test(maybeLang) && maybeLang.length < 20) {
              lang = maybeLang;
              code = inner.slice(newlineIdx + 1);
            }
          }

          const block = document.createElement('div');
          block.className = 'code-block';

          const header = document.createElement('div');
          header.className = 'code-header';

          const langSpan = document.createElement('span');
          langSpan.className = 'code-lang';
          langSpan.textContent = lang || 'code';

          const copyBtn = document.createElement('button');
          copyBtn.className = 'copy-btn';
          copyBtn.innerHTML = '<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Копировать';

          const trimmedCode = code.replace(/^\n+|\n+$/g, '');

          copyBtn.onclick = () => {
            navigator.clipboard.writeText(trimmedCode).then(() => {
              copyBtn.innerHTML = '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Готово!';
              copyBtn.classList.add('copied');
              setTimeout(() => {
                copyBtn.innerHTML = '<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Копировать';
                copyBtn.classList.remove('copied');
              }, 2000);
            });
          };

          header.appendChild(langSpan);
          header.appendChild(copyBtn);

          const codeBody = document.createElement('div');
          codeBody.className = 'code-body';
          codeBody.textContent = trimmedCode;

          block.appendChild(header);
          block.appendChild(codeBody);
          container.appendChild(block);
        } else if (part.trim()) {
          const textEl = document.createElement('div');
          textEl.className = 'bot-text';

          part.split(/(`[^`]+`)/g).forEach(segment => {
            if (segment.startsWith('`') && segment.endsWith('`') && segment.length > 2) {
              const span = document.createElement('span');
              span.className = 'inline-code';
              span.textContent = segment.slice(1, -1);
              textEl.appendChild(span);
            } else if (segment) {
              textEl.appendChild(document.createTextNode(segment));
            }
          });

          container.appendChild(textEl);
        }
      });
    }

    // ==========================
    // IMAGE GEN
    // ==========================
    async function translateToEnglish(text) {
      const key = await getApiKey();
      if (!key) return text;

      try {
        const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
          method: "POST",
          headers: {
            "Authorization": `Bearer ${key}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            model: DEFAULT_MODEL,
            messages: [{
              role: "user",
              content: `Translate to English for image generation. Return ONLY the translation, nothing else: "${text}"`
            }],
            max_tokens: 100,
            temperature: 0.3
          })
        });

        const data = await res.json();
        return data?.choices?.[0]?.message?.content?.trim() || text;
      } catch {
        return text;
      }
    }

    async function generateImage(prompt) {
      const welcome = document.getElementById('welcome');
      if (welcome) welcome.style.display = 'none';

      const container = document.getElementById('messages');
      const wrap = document.createElement('div');
      wrap.className = 'msg bot';
      wrap.style.maxWidth = '90%';

      const label = document.createElement('div');
      label.className = 'bot-text';
      label.textContent = 'Генерирую: "' + prompt + '"';

      const loadDiv = document.createElement('div');
      loadDiv.className = 'gen-image-loading';
      loadDiv.innerHTML = '<div class="spinner"></div>Перевожу и создаю...';

      const imgWrap = document.createElement('div');
      imgWrap.className = 'gen-image-wrap';
      imgWrap.style.display = 'none';

      const img = document.createElement('img');
      img.className = 'gen-image';
      img.alt = prompt;

      wrap.appendChild(label);
      wrap.appendChild(loadDiv);
      wrap.appendChild(imgWrap);

      const actions = document.createElement('div');
      actions.className = 'img-actions';
      wrap.appendChild(actions);

      container.appendChild(wrap);
      container.scrollTop = container.scrollHeight;

      const translated = await translateToEnglish(prompt);
      loadDiv.innerHTML = '<div class="spinner"></div>Создаю изображение...';

      const encodedPrompt = encodeURIComponent(translated);
      const seed = Math.floor(Math.random() * 999999);
      const imgUrl = `https://image.pollinations.ai/prompt/${encodedPrompt}?width=768&height=768&seed=${seed}&nologo=true`;

      img.onload = () => {
        loadDiv.style.display = 'none';
        imgWrap.style.display = 'block';
      };

      img.onerror = () => {
        loadDiv.innerHTML = 'Не удалось. Попробуй другое описание.';
      };

      img.src = imgUrl;
      imgWrap.appendChild(img);

      const dlBtn = document.createElement('button');
      dlBtn.className = 'img-btn';
      dlBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>Скачать';
      dlBtn.onclick = () => {
        const a = document.createElement('a');
        a.href = imgUrl;
        a.download = 'neiroai-' + Date.now() + '.jpg';
        a.target = '_blank';
        a.click();
      };

      const regenBtn = document.createElement('button');
      regenBtn.className = 'img-btn';
      regenBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>Ещё';
      regenBtn.onclick = () => {
        const newSeed = Math.floor(Math.random() * 999999);
        img.src = `https://image.pollinations.ai/prompt/${encodedPrompt}?width=768&height=768&seed=${newSeed}&nologo=true`;
        imgWrap.style.display = 'none';
        loadDiv.style.display = 'flex';
        loadDiv.innerHTML = '<div class="spinner"></div>Новый вариант...';
      };

      actions.appendChild(dlBtn);
      actions.appendChild(regenBtn);
    }

    // ==========================
    // BUILD USER MESSAGE
    // ==========================
    async function buildUserMessage(text) {
      if (!selectedAttachment) {
        return { role: "user", content: text };
      }

      const file = selectedAttachment;

      if (file.type.startsWith('image/')) {
        const base64 = await readFileAsBase64(file);
        return {
          role: "user",
          content: [
            { type: "text", text: text || "Опиши это изображение" },
            {
              type: "image_url",
              image_url: { url: base64 }
            }
          ]
        };
      }

      const textTypes = [
        'text/plain',
        'application/json',
        'text/html',
        'text/css',
        'application/javascript',
        'text/javascript'
      ];

      const isTextByName = /\.(txt|js|html|css|json|md|py|java|cpp|c|h)$/i.test(file.name);

      if (textTypes.includes(file.type) || isTextByName) {
        const content = await readFileAsText(file);
        const safeContent = content.slice(0, 12000);
        return {
          role: "user",
          content:
`${text || 'Проанализируй этот файл'}

Файл: ${file.name}

Содержимое:
\`\`\`
${safeContent}
\`\`\``
        };
      }

      return {
        role: "user",
        content:
`${text || 'Проанализируй этот файл'}

Пользователь прикрепил файл: ${file.name}
Тип: ${file.type || 'неизвестно'}
Размер: ${Math.round(file.size / 1024)} KB

Скажи, что ты не можешь напрямую прочитать этот тип файла в браузере, но можешь помочь, если пользователь загрузит его как текст или скриншот.`
      };
    }

    // ==========================
    // CHAT UI
    // ==========================
    function addMsg(text, type, imageData = null) {
      const welcome = document.getElementById('welcome');
      if (welcome) welcome.style.display = 'none';

      const container = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = `msg ${type}`;

      if (type === 'bot') {
        div.appendChild(parseMessage(text));
      } else {
        if (imageData) {
          const img = document.createElement('img');
          img.className = 'msg-image';
          img.src = imageData;
          div.appendChild(img);
        }
        const textDiv = document.createElement('div');
        textDiv.textContent = text;
        div.appendChild(textDiv);
      }

      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function showTyping() {
      const welcome = document.getElementById('welcome');
      if (welcome) welcome.style.display = 'none';

      const container = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'typing';
      div.id = 'typingIndicator';
      div.innerHTML = '<span></span><span></span><span></span>';
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function hideTyping() {
      document.getElementById('typingIndicator')?.remove();
    }

    function clearChat() {
      document.getElementById('messages').innerHTML = `
        <div class="welcome" id="welcome">
          <div class="w-icon">
            <svg viewBox="0 0 24 24">
              <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8z"/>
              <circle cx="12" cy="12" r="3"/>
              <path d="M12 6v2M12 16v2M6 12h2M16 12h2"/>
            </svg>
          </div>
          <h2>Привет! Я ${aiName}</h2>
          <p>${MODES[curMode].name}</p>
          <div class="suggestions">
            <div class="sug" onclick="askSug('Расскажи о себе')">О тебе</div>
            <div class="sug" onclick="askSug('Напиши змейку на python')">Код</div>
            <div class="sug" onclick="askSug('нарисуй кота в космосе')">Картинка</div>
            <div class="sug" onclick="askSug('Я загружу фото, опиши его')">Фото</div>
          </div>
        </div>
      `;
      resetHistory();
      currentChatId = null;
    }

    function askSug(text) {
      document.getElementById('userInput').value = text;
      sendMsg();
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMsg();
      }
    }

    function autoH(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    // ==========================
    // API
    // ==========================
    async function fetchWithTimeout(url, options, timeout) {
      const controller = new AbortController();
      const id = setTimeout(() => controller.abort(), timeout);
      try {
        const response = await fetch(url, { ...options, signal: controller.signal });
        clearTimeout(id);
        return response;
      } catch (e) {
        clearTimeout(id);
        throw e;
      }
    }

    async function askAI(userText) {
      const key = await getApiKey();
      if (!key) {
        throw new Error('API ключ не найден. Добавь openrouter_key в Firebase Firestore → config → api');
      }

      const userMessage = await buildUserMessage(userText);
      history.push(userMessage);

      if (history.length > MAX_CTX) {
        history = [history[0], ...history.slice(-(MAX_CTX - 1))];
      }

      const model = getModel();

      const body = {
        model,
        messages: history,
        temperature: curMode === 'creative' ? 1.0
          : curMode === 'potato' ? 1.1
          : curMode === 'spicy' ? 0.95
          : 0.8,
        max_tokens: longResp ? 3500 : 900
      };

      const headers = {
        "Authorization": `Bearer ${key}`,
        "Content-Type": "application/json",
        "HTTP-Referer": location.origin || "http://localhost",
        "X-Title": aiName
      };

      let res;
      try {
        res = await fetchWithTimeout(
          "https://openrouter.ai/api/v1/chat/completions",
          { method: "POST", headers, body: JSON.stringify(body) },
          TOUT
        );
      } catch (e) {
        if (e.name === 'AbortError') {
          throw new Error('Таймаут — попробуй ещё раз');
        }
        throw e;
      }

      let data;
      try {
        data = await res.json();
      } catch {
        throw new Error('Ошибка сервера');
      }

      if (!res.ok) {
        const errorMsg = data?.error?.message || '';
        if (errorMsg.includes('No endpoints')) {
          throw new Error('Модель временно недоступна. Попробуй позже.');
        } else if (errorMsg.includes('credit') || errorMsg.includes('quota')) {
          throw new Error('Нет кредитов для этой модели.');
        } else {
          throw new Error(errorMsg || `Ошибка ${res.status}`);
        }
      }

      const text = data?.choices?.[0]?.message?.content;
      if (!text) {
        throw new Error('Пустой ответ');
      }

      history.push({ role: "assistant", content: text });
      return text;
    }

    // ==========================
    // SEND
    // ==========================
    async function sendMsg() {
      if (loading) return;

      const input = document.getElementById('userInput');
      const btn = document.getElementById('sendBtn');
      const text = input.value.trim();

      if (!text && !selectedAttachment) return;

      let imagePreview = null;
      if (selectedAttachment && selectedAttachment.type?.startsWith('image/')) {
        imagePreview = await readFileAsBase64(selectedAttachment);
      }

      const userVisibleText = text || `Файл: ${selectedAttachment?.name || 'без подписи'}`;
      addMsg(userVisibleText, 'user', imagePreview);

      input.value = '';
      input.style.height = 'auto';

      const imageKeywords = [
        'нарисуй',
        'сгенерируй картинку',
        'сделай картинку',
        'создай картинку',
        'нарисуй картинку',
        'сгенерируй изображение',
        'создай изображение',
        'draw',
        'generate image',
        'create image'
      ];

      const isImageRequest = !selectedAttachment &&
        imageKeywords.some(k => text.toLowerCase().includes(k));

      if (isImageRequest) {
        let imagePrompt = text;
        imageKeywords.forEach(k => {
          imagePrompt = imagePrompt.replace(new RegExp(k, 'gi'), '').trim();
        });
        if (!imagePrompt) imagePrompt = text;

        await generateImage(imagePrompt);
        history.push({ role: "user", content: text });
        history.push({ role: "assistant", content: `[Сгенерирована картинка: "${imagePrompt}"]` });
        clearAttachment();
        saveChat();
        return;
      }

      loading = true;
      btn.disabled = true;
      showTyping();

      try {
        const answer = await askAI(text || 'Проанализируй вложение');
        hideTyping();
        addMsg(answer, 'bot');
        clearAttachment();
        saveChat();
      } catch (e) {
        hideTyping();
        addMsg('Ошибка: ' + e.message, 'error');
      } finally {
        loading = false;
        btn.disabled = false;
        input.focus();
      }
    }

    // ==========================
    // MODAL CLOSE
    // ==========================
    document.getElementById('settingsModal').addEventListener('click', e => {
      if (e.target.id === 'settingsModal') closeSettings();
    });

    // ==========================
    // START
    // ==========================
    resetHistory();
  </script>
